<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Finanzas — Control de dinero real</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="app-styles.css">
</head>
<body>

<!-- ============================== TOPBAR ============================== -->
<header class="topbar">
  <button class="icon-btn only-mobile" id="btnMenu" aria-label="Abrir menú">
    <svg viewBox="0 0 24 24"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
  </button>

  <div class="topbar-brand">
    <span class="brand-mark">F</span>
    <span class="brand-name">Finanzas</span>
  </div>

  <div class="topbar-saldo">
    <span class="topbar-saldo-label">Dinero libre real</span>
    <span class="topbar-saldo-valor" id="topbarSaldo">S/ 0.00</span>
  </div>

  <div class="topbar-actions">
    <span id="syncBadge" title="Google Sheets sync" style="font-size:10px; color:#9099A6; cursor:default; user-select:none; letter-spacing:0; margin-right:2px;">○</span>
    <button class="icon-btn" id="btnTema" aria-label="Cambiar tema">
      <svg viewBox="0 0 24 24" id="iconTema"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M1 12h2M21 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4"/></svg>
    </button>
    <button class="icon-btn" id="btnNotif" aria-label="Notificaciones">
      <svg viewBox="0 0 24 24"><path d="M18 8a6 6 0 1 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg>
      <span class="badge-dot" id="notifBadge" hidden></span>
    </button>
  </div>
</header>

<div class="app-shell">

  <!-- ============================== SIDEBAR ============================== -->
  <aside class="sidebar" id="sidebar">
    <nav class="nav-list">
      <button class="nav-item active" data-view="dashboard">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>
        <span>Dashboard</span>
      </button>
      <button class="nav-item" data-view="ingresos">
        <svg viewBox="0 0 24 24"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
        <span>Ingresos</span>
      </button>
      <button class="nav-item" data-view="gastos">
        <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12l7 7 7-7"/></svg>
        <span>Gastos</span>
      </button>
      <button class="nav-item" data-view="cuentas">
        <svg viewBox="0 0 24 24"><rect x="2" y="6" width="20" height="13" rx="2"/><path d="M2 10h20"/></svg>
        <span>Cuentas</span>
      </button>
      <button class="nav-item" data-view="tarjetas">
        <svg viewBox="0 0 24 24"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 9h20M6 14h4"/></svg>
        <span>Tarjetas</span>
      </button>
      <button class="nav-item" data-view="deudas">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M9 12h6M12 9v6"/></svg>
        <span>Deudas</span>
      </button>
      <button class="nav-item" data-view="pendientes">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>
        <span>Pagos pendientes</span>
        <span class="nav-badge" id="navBadgePendientes" hidden></span>
      </button>
      <button class="nav-item" data-view="presupuestos">
        <svg viewBox="0 0 24 24"><path d="M3 3v18h18"/><path d="M7 16l4-6 3 3 5-8"/></svg>
        <span>Presupuestos</span>
      </button>
      <button class="nav-item" data-view="metas">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1"/></svg>
        <span>Metas de ahorro</span>
      </button>
      <button class="nav-item" data-view="recurrentes">
        <svg viewBox="0 0 24 24"><path d="M17 2l4 4-4 4M3 11V9a4 4 0 0 1 4-4h14M7 22l-4-4 4-4M21 13v2a4 4 0 0 1-4 4H3"/></svg>
        <span>Gastos recurrentes</span>
        <span class="tag-nuevo">nuevo</span>
      </button>
      <button class="nav-item" data-view="prestamos">
        <svg viewBox="0 0 24 24"><path d="M12 2v4M12 18v4M4.9 4.9l2.8 2.8M16.3 16.3l2.8 2.8M2 12h4M18 12h4M4.9 19.1l2.8-2.8M16.3 7.7l2.8-2.8"/><circle cx="12" cy="12" r="3"/></svg>
        <span>Préstamos</span>
      </button>
      <button class="nav-item" data-view="historial">
        <svg viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 9-9"/><path d="M3 5v7h7"/><path d="M12 7v5l4 2"/></svg>
        <span>Historial</span>
      </button>
      <button class="nav-item" data-view="reportes">
        <svg viewBox="0 0 24 24"><rect x="4" y="10" width="4" height="10"/><rect x="10" y="4" width="4" height="16"/><rect x="16" y="13" width="4" height="7"/></svg>
        <span>Reportes</span>
      </button>
      <button class="nav-item" data-view="analisis">
        <svg viewBox="0 0 24 24"><path d="M13 2L4 14h6l-1 8 9-12h-6l1-8z"/></svg>
        <span>Análisis inteligente</span>
        <span class="tag-nuevo">nuevo</span>
      </button>
      <button class="nav-item" data-view="configuracion">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.6 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.6a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        <span>Configuración</span>
      </button>
    </nav>

    <div class="sidebar-footer">
      <p>Hecho para llevar el control real de tu dinero.</p>
    </div>
  </aside>

  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- ============================== MAIN ============================== -->
  <main class="main-content" id="mainContent">
    <!-- Las vistas se inyectan dinámicamente por view-*.js -->
  </main>
</div>

<!-- ============================== FAB ============================== -->
<button class="fab" id="fabAdd" aria-label="Registrar movimiento">
  <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
</button>

<div class="fab-menu" id="fabMenu" hidden>
  <button data-action="ingreso"><svg viewBox="0 0 24 24"><path d="M12 19V5M5 12l7-7 7 7"/></svg> Ingreso</button>
  <button data-action="gasto"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12l7 7 7-7"/></svg> Gasto</button>
  <button data-action="transferencia"><svg viewBox="0 0 24 24"><path d="M17 1l4 4-4 4M3 11V9a4 4 0 0 1 4-4h14M7 23l-4-4 4-4M21 13v2a4 4 0 0 1-4 4H3"/></svg> Transferencia</button>
  <button data-action="pago-pendiente"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg> Pago pendiente</button>
  <button data-action="prestamo"><svg viewBox="0 0 24 24"><path d="M12 2v4M12 18v4M4.9 4.9l2.8 2.8M16.3 16.3l2.8 2.8M2 12h4M18 12h4M4.9 19.1l2.8-2.8M16.3 7.7l2.8-2.8"/><circle cx="12" cy="12" r="3"/></svg> Préstamo</button>
</div>
<div class="fab-overlay" id="fabOverlay" hidden></div>

<!-- ============================== MODAL GENÉRICO ============================== -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modal" role="dialog" aria-modal="true">
    <div class="modal-header">
      <h3 id="modalTitle">Título</h3>
      <button class="icon-btn" id="modalClose" aria-label="Cerrar"><svg viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<!-- ============================== TOASTS ============================== -->
<div class="toast-stack" id="toastStack"></div>

<!-- Chart.js con CDN primario + fallback -->
<script>
(function() {
  var CDNS = [
    'https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js',
    'https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.4/chart.umd.min.js',
    'https://unpkg.com/chart.js@4.4.4/dist/chart.umd.min.js'
  ];
  var idx = 0;
  function cargar() {
    if (idx >= CDNS.length) { window._chartJsFailed = true; return; }
    var s = document.createElement('script');
    s.src = CDNS[idx++];
    s.onload = function() { window._chartJsListo = true; };
    s.onerror = function() { cargar(); };
    document.head.appendChild(s);
  }
  cargar();
})();
</script>

<!-- Scripts de la app -->
<script src="app-core.js"></script>
<script src="app-ui.js"></script>
<script src="view-dashboard.js"></script>
<script src="view-ingresos.js"></script>
<script src="view-gastos.js"></script>
<script src="view-cuentas.js"></script>
<script src="view-tarjetas.js"></script>
<script src="view-deudas.js"></script>
<script src="view-pendientes.js"></script>
<script src="view-presupuestos.js"></script>
<script src="view-metas.js"></script>
<script src="view-recurrentes.js"></script>
<script src="view-prestamos.js"></script>
<script src="view-historial.js"></script>
<script src="view-reportes.js"></script>
<script src="view-analisis.js"></script>
<script src="view-configuracion.js"></script>
<script src="sync-sheets.js"></script>
<script src="app-main.js"></script>
</body>
</html>
